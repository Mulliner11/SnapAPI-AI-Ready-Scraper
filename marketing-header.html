<header class="sticky top-0 z-50 border-b border-gray-200 bg-white">
  <div class="mx-auto max-w-7xl px-6 sm:px-8">
    <div class="relative flex h-14 items-center justify-between gap-4">
      <a
        href="/"
        class="flex shrink-0 cursor-pointer items-center gap-2 text-gray-900 transition-opacity hover:opacity-80 dark:text-white"
        aria-label="SnapAPI home"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-6 w-6 shrink-0" aria-hidden="true">
          <rect x="2" y="2" width="9" height="9" rx="2" fill="currentColor" />
          <rect x="13" y="2" width="9" height="9" rx="2" fill="currentColor" />
          <rect x="2" y="13" width="9" height="9" rx="2" fill="currentColor" />
          <rect x="13" y="13" width="9" height="9" rx="2" fill="currentColor" />
        </svg>
        <span class="text-lg font-semibold tracking-tight">SnapAPI</span>
      </a>
      <nav
        class="absolute left-1/2 hidden -translate-x-1/2 items-center gap-8 text-sm font-medium text-gray-900 md:flex"
        aria-label="Primary"
      >
        <a href="/docs" class="transition hover:opacity-80">Docs</a>
        <a href="/#pricing" class="transition hover:opacity-80">Pricing</a>
        <a href="/blog" class="transition hover:opacity-80">Blog</a>
      </nav>
      <div class="flex shrink-0 items-center gap-2 sm:gap-3">
        <div class="relative">
          <button
            type="button"
            id="theme-trigger"
            class="flex h-9 w-9 items-center justify-center rounded-md border border-gray-200 bg-white text-gray-900 transition hover:bg-gray-50"
            aria-expanded="false"
            aria-controls="theme-panel"
            aria-haspopup="listbox"
            aria-label="Theme"
          >
            <svg class="h-[18px] w-[18px] dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <svg class="hidden h-[18px] w-[18px] dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          </button>
          <div
            id="theme-panel"
            data-dropdown
            class="absolute right-0 z-[60] mt-1.5 hidden min-w-[10rem] rounded-lg border border-gray-200 bg-white py-1"
            role="listbox"
            aria-hidden="true"
          >
            <button type="button" data-theme-pick="light" class="block w-full px-3.5 py-2 text-left text-sm text-gray-900 hover:bg-gray-50">Light</button>
            <button type="button" data-theme-pick="dark" class="block w-full px-3.5 py-2 text-left text-sm text-gray-900 hover:bg-gray-50">Dark</button>
            <button type="button" data-theme-pick="system" class="block w-full px-3.5 py-2 text-left text-sm text-gray-900 hover:bg-gray-50">System</button>
          </div>
        </div>
        <a
          id="navLogin"
          href="/login"
          class="inline-flex items-center justify-center rounded-md border border-blue-500/50 bg-blue-600 px-10 py-4 text-lg font-semibold text-white shadow-lg shadow-blue-500/20 transition duration-150 ease-out hover:scale-105 hover:bg-blue-700 active:scale-95"
          >Start free</a
        >
        <a
          id="navDashboard"
          href="/dashboard"
          class="hidden rounded-md border border-gray-200 bg-white px-3.5 py-2 text-sm font-medium text-gray-900 transition hover:bg-gray-50 sm:px-4"
          >Dashboard</a
        >
      </div>
    </div>
    <nav
      class="flex gap-6 overflow-x-auto border-t border-gray-200 py-3 text-sm font-medium text-gray-900 md:hidden"
      aria-label="Primary mobile"
    >
      <a href="/docs" class="shrink-0 whitespace-nowrap transition hover:opacity-80">Docs</a>
      <a href="/#pricing" class="shrink-0 whitespace-nowrap transition hover:opacity-80">Pricing</a>
      <a href="/blog" class="shrink-0 whitespace-nowrap transition hover:opacity-80">Blog</a>
    </nav>
  </div>
</header>
