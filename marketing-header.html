<header
  class="sticky top-0 z-50 border-b border-gray-200/80 bg-white/90 backdrop-blur-md dark:border-white/10 dark:bg-black/80"
>
  <div class="mx-auto max-w-7xl px-6 sm:px-8">
    <div class="relative flex h-14 items-center justify-between gap-4">
      <a href="/" class="flex shrink-0 items-center" aria-label="SnapAPI home">
        <img src="/logo.png" alt="SnapAPI Logo" class="h-8 w-auto object-contain" />
      </a>
      <nav
        class="absolute left-1/2 hidden -translate-x-1/2 items-center gap-8 text-sm font-medium text-gray-800 dark:text-gray-300 md:flex"
        aria-label="Primary"
      >
        <a href="/docs" class="transition hover:text-gray-900 dark:hover:text-white">Docs</a>
        <a href="/#pricing" class="transition hover:text-gray-900 dark:hover:text-white">Pricing</a>
        <a href="/blog" class="transition hover:text-gray-900 dark:hover:text-white">Blog</a>
      </nav>
      <div class="flex shrink-0 items-center gap-2 sm:gap-3">
        <div class="relative">
          <button
            type="button"
            id="theme-trigger"
            class="flex h-9 w-9 items-center justify-center rounded-md border border-gray-200 bg-white text-gray-800 transition hover:bg-gray-50 dark:border-white/12 dark:bg-zinc-900 dark:text-zinc-100 dark:hover:bg-zinc-800"
            aria-expanded="false"
            aria-controls="theme-panel"
            aria-haspopup="listbox"
            aria-label="Theme"
          >
            <svg class="h-[18px] w-[18px] dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <svg class="hidden h-[18px] w-[18px] dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          </button>
          <div
            id="theme-panel"
            data-dropdown
            class="absolute right-0 z-[60] mt-1.5 hidden min-w-[10rem] rounded-lg border border-gray-200 bg-white py-1 shadow-lg dark:border-white/10 dark:bg-zinc-900"
            role="listbox"
            aria-hidden="true"
          >
            <button type="button" data-theme-pick="light" class="block w-full px-3.5 py-2 text-left text-sm text-gray-800 hover:bg-gray-50 dark:text-zinc-200 dark:hover:bg-white/5">Light</button>
            <button type="button" data-theme-pick="dark" class="block w-full px-3.5 py-2 text-left text-sm text-gray-800 hover:bg-gray-50 dark:text-zinc-200 dark:hover:bg-white/5">Dark</button>
            <button type="button" data-theme-pick="system" class="block w-full px-3.5 py-2 text-left text-sm text-gray-800 hover:bg-gray-50 dark:text-zinc-200 dark:hover:bg-white/5">System</button>
          </div>
        </div>
        <a
          id="navLogin"
          href="/login"
          class="rounded-md bg-gray-900 px-3.5 py-2 text-sm font-medium text-white transition hover:bg-gray-800 dark:bg-white dark:text-gray-900 dark:hover:bg-zinc-200 sm:px-4"
          >Start free</a
        >
        <a
          id="navDashboard"
          href="/dashboard"
          class="hidden rounded-md border border-gray-200 bg-white px-3.5 py-2 text-sm font-medium text-gray-900 transition hover:bg-gray-50 dark:border-white/12 dark:bg-zinc-900 dark:text-white dark:hover:bg-zinc-800 sm:px-4"
          >Dashboard</a
        >
      </div>
    </div>
    <nav
      class="flex gap-6 overflow-x-auto border-t border-gray-100 py-3 text-sm font-medium text-gray-800 dark:border-white/10 dark:text-gray-300 md:hidden"
      aria-label="Primary mobile"
    >
      <a href="/docs" class="shrink-0 whitespace-nowrap transition hover:text-gray-900 dark:hover:text-white">Docs</a>
      <a href="/#pricing" class="shrink-0 whitespace-nowrap transition hover:text-gray-900 dark:hover:text-white">Pricing</a>
      <a href="/blog" class="shrink-0 whitespace-nowrap transition hover:text-gray-900 dark:hover:text-white">Blog</a>
    </nav>
  </div>
</header>
