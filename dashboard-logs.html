<!doctype html>
<html lang="en" class="ds-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request log · SnapAPI</title>
    <link rel="stylesheet" href="/globals.css">
    <script src="/ds-tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: window.snapapiDsTailwindExtend || {} },
      };
    </script>
  </head>
  <body class="ds-body-app min-h-screen bg-[#f9fafb] text-base text-gray-600 antialiased leading-relaxed">
    <header
      class="sticky top-0 z-30 flex min-h-14 items-center justify-between gap-3 border-b border-gray-200 bg-white px-4 py-3 md:hidden"
    >
      <a
        href="/"
        class="inline-block shrink-0 cursor-pointer transition-opacity hover:opacity-80"
        aria-label="SnapAPI home"
      >
        <img src="/logo.svg" alt="SnapAPI" class="block h-10 w-auto shrink-0" />
      </a>
      <div class="flex max-w-[min(100%,28rem)] flex-wrap items-center justify-end gap-2">
        <a
          href="/dashboard/billing"
          class="rounded-md border border-gray-200 bg-white px-3 py-2 text-xs font-medium text-gray-900"
          >Billing</a
        >
        <a
          href="/dashboard/logs"
          class="rounded-md border border-gray-200 bg-gray-50 px-3 py-2 text-xs font-medium text-gray-900 shadow-sm"
          >Logs</a
        >
        <a
          href="/dashboard/settings"
          class="rounded-md border border-gray-200 bg-white px-3 py-2 text-xs font-medium text-gray-900"
          >Settings</a
        >
        <a
          href="/dashboard/mcp"
          class="rounded-md border border-gray-200 bg-white px-3 py-2 text-xs font-medium text-gray-900"
          >MCP</a
        >
        <button
          type="button"
          class="snap-logout rounded-md border border-gray-200 bg-white px-3 py-2 text-xs font-medium text-gray-900"
        >
          Log out
        </button>
      </div>
    </header>

    <div class="flex min-h-[calc(100vh-3.5rem)] md:min-h-screen">
      <aside
        class="relative z-20 hidden w-72 shrink-0 flex-col border-r border-gray-200 bg-white md:flex lg:w-80"
        aria-label="Main navigation"
      >
        <div class="flex flex-1 flex-col px-6 pb-10 pt-10 lg:px-8 lg:pt-12">
          <a
            href="/"
            class="inline-block shrink-0 cursor-pointer transition-opacity hover:opacity-80"
            aria-label="SnapAPI home"
          >
            <img src="/logo.svg" alt="SnapAPI" class="block h-10 w-auto shrink-0" />
          </a>
          <p class="mt-3 text-xs font-medium uppercase tracking-[0.18em] text-gray-600">Production console</p>

          <nav class="mt-10 flex flex-col gap-2">
            <a
              href="/dashboard"
              class="rounded-lg border border-transparent px-6 py-4 text-base font-semibold text-gray-600 transition hover:border-gray-200 hover:bg-gray-50 hover:text-gray-900"
              >Dashboard</a
            >
            <a
              href="/dashboard/logs"
              class="rounded-lg border border-gray-200 bg-gray-50 px-6 py-4 text-base font-semibold text-gray-900 shadow-sm"
              >Request log</a
            >
            <a
              href="/dashboard/billing"
              class="rounded-lg border border-transparent px-6 py-4 text-base font-semibold text-gray-600 transition hover:border-gray-200 hover:bg-gray-50 hover:text-gray-900"
              >Billing</a
            >
            <a
              href="/dashboard/settings"
              class="rounded-lg border border-transparent px-6 py-4 text-base font-semibold text-gray-600 transition hover:border-gray-200 hover:bg-gray-50 hover:text-gray-900"
              >Settings</a
            >
            <a
              href="/dashboard/mcp"
              class="rounded-lg border border-transparent px-6 py-4 text-base font-semibold text-gray-600 transition hover:border-gray-200 hover:bg-gray-50 hover:text-gray-900"
              >Enable MCP</a
            >
            <a
              href="/"
              class="rounded-lg border border-transparent px-6 py-4 text-base font-semibold text-gray-600 transition hover:text-gray-900"
              >Marketing site</a
            >
          </nav>

          <div class="mt-auto border-t border-gray-200 pt-8">
            <div class="flex items-center gap-4 rounded-lg border border-gray-200 bg-white p-4 shadow-sm">
              <div
                id="userAvatar"
                class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-blue-600 text-sm font-bold text-white"
                aria-hidden="true"
              >
                —
              </div>
              <div class="min-w-0 flex-1">
                <p class="truncate text-sm font-medium text-gray-600">Signed in</p>
                <p id="userEmailSide" class="truncate text-base font-semibold text-gray-900"></p>
              </div>
            </div>
            <button
              type="button"
              class="snap-logout mt-6 w-full rounded-lg border border-gray-200 bg-white px-6 py-4 text-base font-semibold text-gray-900 shadow-sm transition hover:bg-gray-50"
            >
              Log out
            </button>
          </div>
        </div>
      </aside>

      <div class="min-w-0 flex-1">
        <header
          class="sticky top-0 z-10 hidden min-h-[5rem] border-b border-gray-200 bg-white px-8 py-6 md:flex md:items-center md:px-12 lg:px-16"
        >
          <div class="flex w-full items-center justify-between gap-4">
            <div>
              <h1 class="text-sm font-semibold uppercase tracking-widest text-gray-600">Console</h1>
              <p class="mt-1 text-2xl font-semibold text-gray-900 lg:text-3xl">Request log</p>
            </div>
            <p id="userEmailTop" class="max-w-md truncate text-sm text-gray-600 lg:text-base"></p>
          </div>
        </header>

        <main class="mx-auto w-full max-w-7xl px-6 py-10 sm:px-10 lg:px-16 xl:px-20 lg:py-14">
          <div id="logsPageRoot"></div>
        </main>
      </div>
    </div>

    <script src="/logsPage.js"></script>
    <script>
      const JWT_KEY = "snapapi_jwt";

      function authHeaders() {
        const t = localStorage.getItem(JWT_KEY);
        const h = {};
        if (t) h.Authorization = "Bearer " + t;
        return h;
      }

      function initialsFromEmail(email) {
        const s = String(email || "").trim();
        if (!s) return "?";
        const local = s.split("@")[0] || s;
        return local.slice(0, 2).toUpperCase();
      }

      async function hydrateUser() {
        const r = await fetch("/api/user/me", {
          headers: authHeaders(),
          credentials: "include",
          cache: "no-store",
        });
        if (r.status === 401) {
          window.location.href = "/login";
          return;
        }
        const d = await r.json().catch(() => ({}));
        if (!r.ok) return;
        const email = d.email || "";
        document.getElementById("userEmailSide").textContent = email;
        document.getElementById("userEmailTop").textContent = email;
        document.getElementById("userAvatar").textContent = initialsFromEmail(email);
      }

      document.querySelectorAll(".snap-logout").forEach((b) => {
        b.onclick = async () => {
          localStorage.removeItem(JWT_KEY);
          await fetch("/auth/logout", { method: "POST", credentials: "include" });
          window.location.href = "/login";
        };
      });

      hydrateUser();
      SnapapiLogsPage.mount(document.getElementById("logsPageRoot"), { getAuthHeaders: authHeaders });
    </script>
  </body>
</html>
