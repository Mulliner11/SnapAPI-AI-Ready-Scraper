<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout · SnapAPI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { panel: "#0b1020", accent: "#7c3aed" },
            boxShadow: { glow: "0 0 80px rgba(124, 58, 237, 0.28)" },
          },
        },
      };
    </script>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
      <div class="absolute left-1/2 top-[-220px] h-[520px] w-[520px] -translate-x-1/2 rounded-full bg-fuchsia-500/25 blur-[130px]"></div>
      <div class="absolute bottom-[-180px] right-[-120px] h-[420px] w-[420px] rounded-full bg-indigo-500/20 blur-[120px]"></div>
    </div>

    <header class="border-b border-white/10 bg-slate-950/80 backdrop-blur-md">
      <div class="mx-auto flex max-w-lg items-center justify-between px-6 py-4">
        <a href="/" class="text-sm font-semibold tracking-tight text-white transition hover:text-indigo-200">SnapAPI</a>
        <a href="/dashboard" class="text-xs text-slate-400 transition hover:text-indigo-300">Dashboard</a>
      </div>
    </header>

    <main class="mx-auto max-w-lg px-6 py-10">
      <h1 class="text-2xl font-semibold text-white">
        Upgrade · <span id="planLabel" class="text-indigo-300">Starter</span>
      </h1>
      <p class="mt-2 text-sm text-slate-400">
        Pay securely with crypto via NOWPayments. Click the button below to create your invoice and open the payment page.
      </p>

      <p id="loadErr" class="mt-6 hidden rounded-xl border border-red-500/40 bg-red-500/10 px-4 py-3 text-sm text-red-300"></p>

      <div
        id="card"
        class="mt-10 space-y-6 rounded-3xl border border-white/10 bg-white/[0.03] p-8 shadow-glow backdrop-blur md:p-10"
      >
        <div id="authGate" class="hidden text-sm text-slate-400">
          Checking your session…
        </div>

        <div id="checkoutReady" class="hidden space-y-6">
          <p class="text-sm text-slate-300">
            You are signed in as <span id="userEmail" class="font-mono text-indigo-200"></span>
          </p>
          <button
            type="button"
            id="payBtn"
            class="flex w-full items-center justify-center gap-2 rounded-xl border border-indigo-500/50 bg-gradient-to-r from-indigo-600/40 to-fuchsia-600/35 px-6 py-3.5 text-sm font-semibold text-white shadow-glow transition hover:border-indigo-400/70 hover:from-indigo-500/50 hover:to-fuchsia-500/45 hover:shadow-[0_0_28px_rgba(99,102,241,0.25)] active:scale-[0.99] disabled:cursor-not-allowed disabled:opacity-45"
          >
            <span id="payBtnLabel">Create invoice &amp; pay</span>
            <span
              id="payBtnSpinner"
              class="hidden h-4 w-4 shrink-0 animate-spin rounded-full border-2 border-white/30 border-t-white"
              aria-hidden="true"
            ></span>
          </button>
          <p class="text-center text-xs text-slate-500">You will be redirected to NOWPayments to complete checkout.</p>
        </div>
      </div>
    </main>

    <script>
      const JWT_KEY = "snapapi_jwt";

      function authHeaders() {
        const h = { "Content-Type": "application/json" };
        const t = localStorage.getItem(JWT_KEY);
        if (t) h.Authorization = "Bearer " + t;
        return h;
      }

      function planFromQuery() {
        const p = new URLSearchParams(window.location.search).get("plan");
        if (p === "agency") return "agency";
        if (p === "business") return "business";
        return "pro";
      }

      function showError(msg) {
        document.getElementById("loadErr").textContent = msg;
        document.getElementById("loadErr").classList.remove("hidden");
      }

      function setPayLoading(on) {
        const btn = document.getElementById("payBtn");
        const spin = document.getElementById("payBtnSpinner");
        btn.disabled = on;
        spin.classList.toggle("hidden", !on);
      }

      let plan = "pro";

      async function ensureSession() {
        const me = await fetch("/api/user/me", { credentials: "include", headers: authHeaders() });
        const meData = await me.json().catch(() => ({}));

        const hasIdentity = !!(meData.email && (meData.api_key || meData.apiKey));
        const isAuthed =
          me.status !== 401 && (meData.loggedIn === true || (meData.loggedIn !== false && hasIdentity));

        if (me.status === 401 || !isAuthed) {
          window.location.replace(
            "/login?redirect=" + encodeURIComponent("/checkout?plan=" + plan) + "&plan=" + encodeURIComponent(plan)
          );
          return false;
        }

        if (!me.ok) {
          showError(meData.error || "Could not verify session.");
          return false;
        }

        document.getElementById("userEmail").textContent = meData.email || "—";
        document.getElementById("authGate").classList.add("hidden");
        document.getElementById("checkoutReady").classList.remove("hidden");
        return true;
      }

      async function createInvoiceAndRedirect() {
        setPayLoading(true);
        document.getElementById("loadErr").classList.add("hidden");
        try {
          const inv = await fetch("/api/payment/create-invoice", {
            method: "POST",
            credentials: "include",
            headers: authHeaders(),
            body: JSON.stringify({ plan: plan }),
          });
          const invData = await inv.json().catch(() => ({}));
          if (!inv.ok) {
            showError(invData.error || "Could not create invoice.");
            return;
          }

          const url = invData.invoice_url || invData.invoiceUrl;
          if (!url || typeof url !== "string") {
            showError("No payment URL returned.");
            return;
          }

          window.location.href = url;
        } finally {
          setPayLoading(false);
        }
      }

      (async function init() {
        plan = planFromQuery();
        document.getElementById("planLabel").textContent =
          plan === "agency" ? "Agency" : plan === "business" ? "Pro" : "Starter";

        document.getElementById("authGate").classList.remove("hidden");
        const ok = await ensureSession();
        if (!ok) return;

        document.getElementById("payBtn").onclick = () => createInvoiceAndRedirect();
      })();
    </script>
  </body>
</html>
