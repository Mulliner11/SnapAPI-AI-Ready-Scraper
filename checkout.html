<!doctype html>
<html lang="en" class="ds-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout · SnapAPI</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("snapapi-theme");
          var r = document.documentElement;
          if (t === "light") r.classList.remove("dark");
          else if (t === "dark") r.classList.add("dark");
          else {
            r.classList.remove("dark");
            if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) r.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/globals.css" />
    <script src="/ds-tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { extend: window.snapapiDsTailwindExtend || {} },
      };
    </script>
    <script src="/landing-theme.js" defer></script>
    <script src="/ds-marketing-header-boot.js" defer></script>
  </head>
  <body class="ds-body-marketing min-h-screen bg-white text-base font-sans text-neutral-900 antialiased leading-relaxed dark:bg-black dark:text-neutral-100">
    <div id="ds-marketing-header-root"></div>

    <main class="ds-section-inner mx-auto max-w-3xl px-6 py-16 sm:px-8 sm:py-20">
      <h1 class="text-3xl font-semibold tracking-tight text-neutral-900 dark:text-white">
        Upgrade · <span id="planLabel" class="text-violet-600 dark:text-violet-400">Pro</span>
      </h1>
      <p class="mt-3 text-base text-neutral-600 dark:text-neutral-400">
        Pay securely with crypto via NOWPayments. Click the button below to create your invoice and open the payment page.
      </p>

      <p id="loadErr" class="mt-6 hidden rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-base text-red-800 dark:border-red-500/40 dark:bg-red-500/10 dark:text-red-200"></p>

      <div
        id="card"
        class="mt-10 space-y-6 rounded-xl border border-neutral-200 bg-white p-8 shadow-sm dark:border-white/10 dark:bg-zinc-900 md:p-10"
      >
        <div id="authGate" class="hidden text-base text-neutral-600 dark:text-neutral-400">Checking your session…</div>

        <div id="checkoutReady" class="hidden space-y-6">
          <p class="text-base text-neutral-700 dark:text-neutral-300">
            You are signed in as <span id="userEmail" class="font-mono text-violet-600 dark:text-violet-400"></span>
          </p>
          <button
            type="button"
            id="payBtn"
            class="flex w-full items-center justify-center gap-2 rounded-lg border border-neutral-900 bg-neutral-900 px-6 py-4 text-base font-medium text-white transition hover:bg-neutral-800 active:scale-[0.99] disabled:cursor-not-allowed disabled:opacity-45 dark:border-white dark:bg-white dark:text-neutral-900 dark:hover:bg-neutral-200"
          >
            <span id="payBtnLabel">Create invoice &amp; pay</span>
            <span
              id="payBtnSpinner"
              class="hidden h-4 w-4 shrink-0 animate-spin rounded-full border-2 border-white/30 border-t-white dark:border-neutral-900/30 dark:border-t-neutral-900"
              aria-hidden="true"
            ></span>
          </button>
          <p class="text-center text-sm text-gray-600 dark:text-gray-600">You will be redirected to NOWPayments to complete checkout.</p>
        </div>
      </div>
    </main>

    <script src="/paymentConfirmModal.js"></script>
    <script>
      const JWT_KEY = "snapapi_jwt";

      function authHeaders() {
        const h = { "Content-Type": "application/json" };
        const t = localStorage.getItem(JWT_KEY);
        if (t) h.Authorization = "Bearer " + t;
        return h;
      }

      function planFromQuery() {
        const p = new URLSearchParams(window.location.search).get("plan");
        if (p === "agency") return "business";
        if (p === "business") return "business";
        return "pro";
      }

      function showError(msg) {
        document.getElementById("loadErr").textContent = msg;
        document.getElementById("loadErr").classList.remove("hidden");
      }

      function setPayLoading(on) {
        const btn = document.getElementById("payBtn");
        const spin = document.getElementById("payBtnSpinner");
        btn.disabled = on;
        spin.classList.toggle("hidden", !on);
      }

      let plan = "pro";

      async function ensureSession() {
        const me = await fetch("/api/user/me", { credentials: "include", headers: authHeaders() });
        const meData = await me.json().catch(() => ({}));

        const hasIdentity = !!(meData.email && (meData.api_key || meData.apiKey));
        const isAuthed =
          me.status !== 401 && (meData.loggedIn === true || (meData.loggedIn !== false && hasIdentity));

        if (me.status === 401 || !isAuthed) {
          window.location.replace(
            "/login?redirect=" + encodeURIComponent("/checkout?plan=" + plan) + "&plan=" + encodeURIComponent(plan)
          );
          return false;
        }

        if (!me.ok) {
          showError(meData.error || "Could not verify session.");
          return false;
        }

        document.getElementById("userEmail").textContent = meData.email || "—";
        document.getElementById("authGate").classList.add("hidden");
        document.getElementById("checkoutReady").classList.remove("hidden");
        return true;
      }

      async function createInvoiceAndRedirect() {
        setPayLoading(true);
        document.getElementById("loadErr").classList.add("hidden");
        try {
          const inv = await fetch("/api/payment/create-invoice", {
            method: "POST",
            credentials: "include",
            headers: authHeaders(),
            body: JSON.stringify({ plan: plan }),
          });
          const invData = await inv.json().catch(() => ({}));
          if (!inv.ok) {
            showError(invData.error || "Could not create invoice.");
            return;
          }

          const url = invData.invoice_url || invData.invoiceUrl;
          if (!url || typeof url !== "string") {
            showError("No payment URL returned.");
            return;
          }

          window.location.href = url;
        } finally {
          setPayLoading(false);
        }
      }

      (async function init() {
        plan = planFromQuery();
        document.getElementById("planLabel").textContent = plan === "business" ? "Business" : "Pro";

        document.getElementById("authGate").classList.remove("hidden");
        const ok = await ensureSession();
        if (!ok) return;

        document.getElementById("payBtn").onclick = function () {
          if (typeof window.snapapiOpenPaymentConfirmation === "function") {
            window.snapapiOpenPaymentConfirmation(createInvoiceAndRedirect);
          } else {
            createInvoiceAndRedirect();
          }
        };
      })();
    </script>
  </body>
</html>
