<!doctype html>
<html lang="en" class="ds-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifying… · SnapAPI</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("snapapi-theme");
          var r = document.documentElement;
          if (t === "light") r.classList.remove("dark");
          else if (t === "dark") r.classList.add("dark");
          else {
            r.classList.remove("dark");
            if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) r.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="/globals.css">
    <script src="/ds-tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { extend: window.snapapiDsTailwindExtend || {} },
      };
    </script>
    <script src="/landing-theme.js" defer></script>
    <script src="/ds-marketing-header-boot.js" defer></script>
  </head>
  <body class="ds-body-marketing min-h-screen bg-white font-sans text-neutral-900 antialiased dark:bg-black dark:text-neutral-100">
    <div id="ds-marketing-header-root"></div>
    <div class="mx-auto flex min-h-[calc(100vh-3.5rem)] max-w-md flex-col items-center justify-center px-6 py-12 sm:px-8">
      <div
        id="loadingBlock"
        class="w-full rounded-xl border border-neutral-200 bg-white p-10 text-center shadow-sm dark:border-white/10 dark:bg-zinc-900"
      >
        <div
          class="mx-auto h-10 w-10 animate-spin rounded-full border-2 border-neutral-200 border-t-neutral-900 dark:border-white/20 dark:border-t-white"
          aria-hidden="true"
        ></div>
        <p class="mt-6 text-sm font-medium text-neutral-900 dark:text-neutral-200">Confirming your sign-in link…</p>
        <p class="mt-2 text-xs text-gray-600 dark:text-gray-600">You will be redirected to the dashboard.</p>
      </div>

      <div id="errorBlock" class="hidden w-full rounded-xl border border-red-200 bg-red-50 p-6 text-left dark:border-red-500/40 dark:bg-red-500/10">
        <p class="text-sm font-medium text-red-800 dark:text-red-200">Could not verify</p>
        <p id="errorText" class="mt-2 text-sm text-red-700 dark:text-red-300/90"></p>
        <a href="/login" class="mt-4 inline-block text-sm text-violet-600 hover:underline dark:text-violet-400">Back to sign in</a>
      </div>
    </div>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var token = params.get("token");
        if (!token || token.length < 32) {
          document.getElementById("loadingBlock").classList.add("hidden");
          document.getElementById("errorBlock").classList.remove("hidden");
          document.getElementById("errorText").textContent =
            "This link is missing a token or it is too short. Request a new sign-in email.";
          return;
        }
        window.location.replace("/api/auth/verify?token=" + encodeURIComponent(token));
      })();
    </script>
  </body>
</html>
