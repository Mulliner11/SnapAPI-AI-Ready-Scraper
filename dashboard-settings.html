<!doctype html>
<html lang="en" class="ds-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings · SnapAPI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/globals.css" />
    <script src="/ds-tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: Object.assign({}, window.snapapiDsTailwindExtend || {}, {
            colors: {
              panel: "#09090b",
              panelElevated: "#0c0c0f",
            },
            boxShadow: {
              console: "0 1px 0 0 rgba(0,0,0,0.04) inset, 0 0 0 1px rgba(0,0,0,0.06)",
            },
          }),
        },
      };
    </script>
  </head>
  <body class="ds-body-app min-h-screen bg-white text-base text-neutral-800 antialiased leading-relaxed">
        <header
      class="sticky top-0 z-30 flex min-h-[8.5rem] items-center justify-between gap-4 border-b border-neutral-200 bg-white/95 px-6 py-6 backdrop-blur-xl md:hidden"
    >
      <a href="/" class="text-5xl font-bold tracking-tight text-neutral-900">SnapAPI</a>
      <div class="flex flex-wrap items-center justify-end gap-2">
        <a
          href="/dashboard/billing"
          class="rounded-xl border border-neutral-200 bg-neutral-100 px-4 py-5 text-xs font-semibold text-neutral-800 sm:text-sm"
          >Billing</a
        >
        <a
          href="/dashboard/logs"
          class="rounded-xl border border-neutral-200 bg-neutral-100 px-4 py-5 text-xs font-semibold text-neutral-800 sm:text-sm"
          >Logs</a
        >
        <a
          href="/dashboard/settings"
          class="rounded-xl border border-indigo-500/35 bg-indigo-500/15 px-4 py-5 text-xs font-semibold text-neutral-900 sm:text-sm"
          >Settings</a
        >
        <a
          href="/dashboard/mcp"
          class="rounded-xl border border-neutral-200 bg-neutral-100 px-4 py-5 text-xs font-semibold text-neutral-800 sm:text-sm"
          >MCP</a
        >
        <button
          type="button"
          class="snap-logout rounded-xl border border-neutral-200 bg-neutral-100 px-4 py-5 text-xs font-semibold text-neutral-800 sm:text-sm"
        >
          Log out
        </button>
      </div>
    </header>

    <div class="flex min-h-[calc(100vh-8.5rem)] md:min-h-screen">
      <aside
        class="relative z-20 hidden w-72 shrink-0 flex-col border-r border-neutral-200 bg-white backdrop-blur-xl md:flex lg:w-80"
        aria-label="Main navigation"
      >
        <div class="flex flex-1 flex-col px-6 pb-10 pt-12 lg:px-8 lg:pt-14">
          <a href="/" class="text-5xl font-bold tracking-tight text-neutral-900">SnapAPI</a>
          <p class="mt-2 text-xs font-medium uppercase tracking-[0.18em] text-gray-600">Production console</p>

          <nav class="mt-14 flex flex-col gap-3">
            <a
              href="/dashboard"
              class="rounded-xl border border-neutral-200 bg-transparent px-8 py-6 text-xl font-semibold text-neutral-600 transition hover:border-neutral-200 hover:bg-neutral-100 hover:text-neutral-900"
              >Dashboard</a
            >
            <a
              href="/dashboard/logs"
              class="rounded-xl border border-neutral-200 bg-transparent px-8 py-6 text-xl font-semibold text-neutral-600 transition hover:border-neutral-200 hover:bg-neutral-100 hover:text-neutral-900"
              >Request log</a
            >
            <a
              href="/dashboard/billing"
              class="rounded-xl border border-neutral-200 bg-transparent px-8 py-6 text-xl font-semibold text-neutral-600 transition hover:border-neutral-200 hover:bg-neutral-100 hover:text-neutral-900"
              >Billing</a
            >
            <a
              href="/dashboard/settings"
              class="rounded-xl border border-indigo-500/35 bg-indigo-500/15 px-8 py-6 text-xl font-semibold text-neutral-900 shadow-sm"
              >Settings</a
            >
            <a
              href="/dashboard/mcp"
              class="rounded-xl border border-neutral-200 bg-transparent px-8 py-6 text-xl font-semibold text-neutral-600 transition hover:border-neutral-200 hover:bg-neutral-100 hover:text-neutral-900"
              >Enable MCP</a
            >
            <a
              href="/"
              class="rounded-xl border border-transparent px-8 py-6 text-xl font-semibold text-gray-600 transition hover:text-neutral-700"
              >Marketing site</a
            >
          </nav>

          <div class="mt-auto border-t border-neutral-200 pt-8">
            <div class="flex items-center gap-4 rounded-xl border border-neutral-200 bg-white p-4 shadow-sm">
              <div
                id="userAvatar"
                class="flex h-14 w-14 shrink-0 items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-fuchsia-600 text-base font-bold text-white shadow-lg shadow-indigo-950/50"
                aria-hidden="true"
              >
                —
              </div>
              <div class="min-w-0 flex-1">
                <p class="truncate text-sm font-medium text-neutral-600">Signed in</p>
                <p id="userEmailSide" class="truncate text-base font-semibold text-neutral-900"></p>
              </div>
            </div>
            <button
              type="button"
              class="snap-logout mt-6 w-full rounded-xl border border-neutral-200 bg-neutral-100 px-8 py-6 text-xl font-semibold text-neutral-800 transition hover:border-neutral-300 hover:bg-neutral-200"
            >
              Log out
            </button>
          </div>
        </div>
      </aside>

      <div class="min-w-0 flex-1">
        <header
          class="sticky top-0 z-10 hidden min-h-[10rem] border-b border-neutral-200 bg-white/95 px-8 py-8 backdrop-blur-xl md:flex md:items-center md:px-12 lg:px-16"
        >
          <div class="flex w-full items-center justify-between gap-4">
            <div>
              <h1 class="text-lg font-semibold uppercase tracking-widest text-gray-600">Console</h1>
              <p class="mt-2 text-2xl font-semibold text-neutral-900 lg:text-3xl">Settings</p>
            </div>
            <p id="userEmailTop" class="max-w-md truncate text-lg text-gray-600"></p>
          </div>
        </header>

        <main class="mx-auto w-full max-w-3xl px-6 py-12 sm:px-10 lg:px-16 xl:px-20 lg:py-16">
          <div id="settingsPageRoot"></div>
        </main>
      </div>
    </div>

    <script src="/settingsPage.js"></script>
    <script>
      const JWT_KEY = "snapapi_jwt";

      function authHeaders() {
        const t = localStorage.getItem(JWT_KEY);
        const h = {};
        if (t) h.Authorization = "Bearer " + t;
        return h;
      }

      function initialsFromEmail(email) {
        const s = String(email || "").trim();
        if (!s) return "?";
        const local = s.split("@")[0] || s;
        return local.slice(0, 2).toUpperCase();
      }

      async function hydrateUser() {
        const r = await fetch("/api/user/me", {
          headers: authHeaders(),
          credentials: "include",
          cache: "no-store",
        });
        if (r.status === 401) {
          window.location.href = "/login";
          return;
        }
        const d = await r.json().catch(() => ({}));
        if (d.loggedIn === false) {
          window.location.href = "/login";
          return;
        }
        if (!r.ok) return;
        const email = d.email || "";
        document.getElementById("userEmailSide").textContent = email;
        document.getElementById("userEmailTop").textContent = email;
        document.getElementById("userAvatar").textContent = initialsFromEmail(email);
      }

      document.querySelectorAll(".snap-logout").forEach((b) => {
        b.onclick = async () => {
          localStorage.removeItem(JWT_KEY);
          await fetch("/auth/logout", { method: "POST", credentials: "include" });
          window.location.href = "/login";
        };
      });

      hydrateUser();
      SnapapiSettingsPage.mount(document.getElementById("settingsPageRoot"), {
        getAuthHeaders: authHeaders,
        jwtStorageKey: JWT_KEY,
      });
    </script>
  </body>
</html>
