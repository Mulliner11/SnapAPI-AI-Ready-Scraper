[phases.setup]
# 只使用 aptPkgs，这是在 Debian/Ubuntu 环境下安装 Playwright 依赖的最稳妥方式
aptPkgs = [
  "wget",
  "ca-certificates",
  "fonts-liberation",
  "libfontconfig1",
  "libfreetype6",
  "libasound2",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libatspi2.0-0",
  "libcairo2",
  "libcups2",
  "libdbus-1-3",
  "libdrm2",
  "libgbm1",
  "libglib2.0-0",
  "libnspr4",
  "libnss3",
  "libpango-1.0-0",
  "libwayland-client0",
  "libx11-6",
  "libxcb1",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxkbcommon0",
  "libxrandr2",
  "libx11-xcb1",
  "libxcursor1",
  "libxi6",
  "libxtst6",
  "xdg-utils"
]

[variables]
# 告诉 Playwright 不要去检查系统环境，因为我们已经手动装好了依赖
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS = "1"
