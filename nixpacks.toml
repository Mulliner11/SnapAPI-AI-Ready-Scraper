# Railway (Nixpacks): Node + Playwright Chromium system libraries.
# Build: `npm run build` runs `playwright install --with-deps chromium`; runtime still needs
# matching .so on PATH (apt) and/or LD_LIBRARY_PATH (nixLibs) depending on base image.

[variables]
# Avoid host-dependency validation failures when mixing Nix/apt layouts.
PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS = "1"

[phases.setup]
# Extend provider defaults (e.g. node).
nixPkgs = [
  "...",
  "nodejs_20", # 强制使用 Node 20
  # Nix equivalents of Chromium’s common shared-library needs (runtime + linker visibility).
  "glib",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "at-spi2-core",
  "cups",
  "libdrm",
  "libxkbcommon",
  "mesa",
  "alsa-lib",
  "pango",
  "cairo",
  "harfbuzz",
  "gtk3",
  "dbus",
  "expat",
  "fontconfig",
  "freetype",
  "wayland",
  "zlib",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "xorg.libXi",
  "xorg.libXcursor",
  "xorg.libXtst",
]

# Append each package’s lib/ output to LD_LIBRARY_PATH so Chromium finds libglib-2.0.so.0, etc.
nixLibs = [
  "glib",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "at-spi2-core",
  "cups",
  "libdrm",
  "libxkbcommon",
  "mesa",
  "alsa-lib",
  "pango",
  "cairo",
  "harfbuzz",
  "gtk3",
  "dbus",
  "expat",
  "fontconfig",
  "freetype",
  "wayland",
  "zlib",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "xorg.libXi",
  "xorg.libXcursor",
  "xorg.libXtst",
]

# Debian/Ubuntu names — mirrors Playwright’s `ubuntu22.04-x64` chromium deps (+ common extras).
aptPkgs = [
  "...",
  "wget",
  "ca-certificates",
  "fonts-liberation",
  "libfontconfig1",
  "libfreetype6",
  "libasound2",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libatspi2.0-0",
  "libcairo2",
  "libcups2",
  "libdbus-1-3",
  "libdrm2",
  "libgbm1",
  "libglib2.0-0",
  "libnspr4",
  "libnss3",
  "libpango-1.0-0",
  "libwayland-client0",
  "libx11-6",
  "libxcb1",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxkbcommon0",
  "libxrandr2",
  "libx11-xcb1",
  "libxcursor1",
  "libxi6",
  "libxtst6",
  "xdg-utils",
]
