<!doctype html>
<html lang="en" class="ds-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in · SnapAPI</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("snapapi-theme");
          var r = document.documentElement;
          if (t === "light") r.classList.remove("dark");
          else if (t === "dark") r.classList.add("dark");
          else {
            r.classList.remove("dark");
            if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) r.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="/globals.css">
    <script src="/ds-tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { extend: window.snapapiDsTailwindExtend || {} },
      };
    </script>
    <script src="/landing-theme.js" defer></script>
    <script src="/ds-marketing-header-boot.js" defer></script>
  </head>
  <body class="ds-body-marketing min-h-screen bg-white font-sans text-neutral-900 antialiased leading-relaxed dark:bg-black dark:text-neutral-100">
    <div id="ds-marketing-header-root"></div>
    <div class="mx-auto flex min-h-[calc(100vh-3.5rem)] max-w-lg flex-col justify-center px-6 py-12 sm:px-8 sm:py-16">
      <h1 class="text-3xl font-semibold tracking-tight text-neutral-900 dark:text-white">Sign in</h1>
      <p class="mt-3 text-base text-gray-700 dark:text-gray-300">
        Enter your email and we&rsquo;ll send a <strong class="font-medium text-neutral-900 dark:text-neutral-200">magic link</strong> to sign
        in. First-time sign-in creates your account and a free <code class="text-violet-600 dark:text-violet-400">sk-live-</code> API key.
      </p>
      <p id="errorBanner" class="mt-4 hidden rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-base text-red-800 dark:border-red-500/30 dark:bg-red-500/10 dark:text-red-200"></p>
      <div id="devLinkBox" class="mt-4 hidden rounded-lg border border-amber-200 bg-amber-50 p-4 text-sm text-amber-900 dark:border-amber-500/30 dark:bg-amber-500/10 dark:text-amber-100">
        <p class="font-medium text-amber-800 dark:text-amber-200">Development · RESEND_API_KEY not set</p>
        <a id="devMagicLink" class="mt-2 block break-all text-violet-600 underline dark:text-violet-400" href="#"></a>
      </div>

      <div class="mt-8 space-y-5 rounded-xl border border-neutral-200 bg-white p-8 shadow-sm dark:border-white/10 dark:bg-zinc-900">
        <div>
          <label class="text-sm font-medium text-gray-800 dark:text-gray-300">Email</label>
          <input
            id="email"
            type="email"
            class="mt-2 w-full rounded-lg border border-neutral-200 bg-white px-4 py-3.5 text-base text-neutral-900 outline-none ring-0 placeholder:text-neutral-400 focus:border-neutral-400 dark:border-white/10 dark:bg-black dark:text-white"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </div>
        <button
          type="button"
          id="continueBtn"
          class="w-full rounded-lg bg-neutral-900 py-3.5 text-base font-medium text-white transition hover:bg-neutral-800 dark:bg-white dark:text-neutral-900 dark:hover:bg-neutral-200"
        >
          Email me a login link
        </button>
        <p id="msg" class="text-center text-base text-red-600 dark:text-red-400"></p>
      </div>
      <a href="/" class="mt-6 text-center text-base text-gray-700 underline-offset-4 hover:text-gray-900 hover:underline dark:text-gray-300 dark:hover:text-white">Back to home</a>
    </div>
    <script>
      const emailEl = document.getElementById("email");
      const msg = document.getElementById("msg");
      const errorBanner = document.getElementById("errorBanner");
      const devLinkBox = document.getElementById("devLinkBox");
      const devMagicLink = document.getElementById("devMagicLink");

      const errMap = {
        invalid_token: "This sign-in link is invalid. Request a new email.",
        invalid_or_expired: "This link has expired or was already used. Send a new one.",
        server: "Something went wrong. Please try again shortly.",
        user: "We couldn&rsquo;t create or load your account. Please try again shortly.",
      };
      const params = new URLSearchParams(window.location.search);
      const err = params.get("error");
      if (err && errMap[err]) {
        errorBanner.textContent = errMap[err];
        errorBanner.classList.remove("hidden");
      }

      const red = params.get("redirect");
      const pl = params.get("plan");
      if (red === "/playground") {
        fetch("/api/auth/pending-redirect", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ redirect: "/playground" }),
        }).catch(function () {});
      }
      if (red === "/checkout" && (pl === "pro" || pl === "business")) {
        fetch("/api/auth/pending-redirect", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ redirect: red, plan: pl }),
        }).catch(function () {});
      }

      async function go() {
        msg.textContent = "";
        msg.className = "text-center text-sm text-red-600 dark:text-red-400";
        devLinkBox.classList.add("hidden");
        const email = emailEl.value.trim();
        if (!email) return (msg.textContent = "Please enter your email");
        const btn = document.getElementById("continueBtn");
        btn.disabled = true;
        try {
          const r = await fetch("/api/auth/send-magic-link", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          const d = await r.json().catch(() => ({}));
          if (!r.ok) {
            msg.textContent = d.error || "Something went wrong";
            return;
          }
          if (d.dev && d.magicLink) {
            devLinkBox.classList.remove("hidden");
            devMagicLink.href = d.magicLink;
            devMagicLink.textContent = d.magicLink;
            msg.className = "text-center text-sm text-emerald-600 dark:text-emerald-400";
            msg.textContent = d.message || "Open the development link below to continue.";
            return;
          }
          msg.className = "text-center text-sm text-emerald-600 dark:text-emerald-400";
          msg.textContent = d.message || "Check your inbox and click the link to sign in.";
        } finally {
          btn.disabled = false;
        }
      }

      document.getElementById("continueBtn").onclick = go;
      emailEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") go();
      });
    </script>
  </body>
</html>
