<!doctype html>
<html lang="en" class="ds-root h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog · SnapAPI</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("snapapi-theme");
          var r = document.documentElement;
          if (t === "light") r.classList.remove("dark");
          else if (t === "dark") r.classList.add("dark");
          else {
            r.classList.remove("dark");
            if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) r.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="/globals.css">
    <script src="/ds-tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { extend: window.snapapiDsTailwindExtend || {} },
      };
    </script>
    <script src="/landing-theme.js" defer></script>
    <script src="/ds-marketing-header-boot.js" defer></script>
  </head>
  <body class="ds-body-marketing min-h-full bg-white font-sans text-neutral-900 antialiased dark:bg-black dark:text-neutral-100">
    <div id="ds-marketing-header-root"></div>
    <main class="ds-section-inner ds-section px-6 sm:px-8">
      <div class="mx-auto max-w-lg py-16 text-center sm:py-20">
        <p class="text-sm font-medium uppercase tracking-widest text-gray-600 dark:text-gray-600">SnapAPI</p>
        <h1 class="mt-4 text-2xl font-semibold tracking-tight text-neutral-900 dark:text-white">Blog</h1>
        <p class="mt-3 text-neutral-600 dark:text-neutral-400">Product updates and guides are on the way. For now, see the documentation.</p>
        <a
          href="/docs"
          class="mt-8 inline-flex rounded-lg bg-neutral-900 px-6 py-3 text-sm font-medium text-white transition hover:bg-neutral-800 dark:bg-white dark:text-neutral-900 dark:hover:bg-neutral-200"
          >Open docs</a
        >
        <p class="mt-10">
          <a href="/" class="text-sm text-neutral-600 underline-offset-4 hover:text-neutral-900 hover:underline dark:text-neutral-400 dark:hover:text-white"
            >← Back home</a
          >
        </p>
      </div>
    </main>
  </body>
</html>
