<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapAPI · Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div class="mx-auto max-w-4xl px-6 py-10">
      <div class="flex flex-wrap items-center justify-between gap-4">
        <h1 class="text-2xl font-semibold">Dashboard</h1>
        <div class="flex gap-2">
          <button
            type="button"
            id="copyKey"
            class="rounded-xl border border-white/20 px-4 py-2 text-sm hover:bg-white/5"
          >
            复制 API Key
          </button>
          <button type="button" id="logout" class="rounded-xl bg-slate-800 px-4 py-2 text-sm hover:bg-slate-700">
            退出
          </button>
        </div>
      </div>

      <p id="loadErr" class="mt-4 hidden text-red-400"></p>

      <section class="mt-8 rounded-2xl border border-white/10 bg-white/5 p-6">
        <h2 class="text-sm font-medium text-slate-400">API Key</h2>
        <code id="apiKey" class="mt-2 block break-all rounded-lg bg-slate-900/80 p-3 text-sm text-indigo-200"></code>
      </section>

      <section class="mt-6 rounded-2xl border border-white/10 bg-white/5 p-6">
        <div class="flex justify-between text-sm">
          <span class="text-slate-400">本月用量</span>
          <span id="usageText" class="font-mono"></span>
        </div>
        <div class="mt-3 h-3 overflow-hidden rounded-full bg-slate-800">
          <div id="usageBar" class="h-full rounded-full bg-gradient-to-r from-indigo-500 to-fuchsia-500 transition-all" style="width: 0%"></div>
        </div>
        <p class="mt-2 text-xs text-slate-500">套餐：<span id="planName"></span></p>
      </section>

      <section class="mt-6 rounded-2xl border border-white/10 bg-white/5 p-6">
        <h2 class="text-sm font-medium text-slate-400">最近请求（最多 20 条）</h2>
        <div class="mt-4 overflow-x-auto">
          <table class="w-full text-left text-sm">
            <thead>
              <tr class="border-b border-white/10 text-slate-500">
                <th class="pb-2 pr-4">时间</th>
                <th class="pb-2 pr-4">接口</th>
                <th class="pb-2 pr-4">目标 URL</th>
                <th class="pb-2">结果</th>
              </tr>
            </thead>
            <tbody id="logBody"></tbody>
          </table>
        </div>
      </section>
    </div>
    <script>
      async function load() {
        const r = await fetch("/api/dashboard/summary", { credentials: "include" });
        if (r.status === 401) {
          window.location.href = "/login";
          return;
        }
        const d = await r.json().catch(() => ({}));
        if (!r.ok) {
          document.getElementById("loadErr").classList.remove("hidden");
          document.getElementById("loadErr").textContent = d.error || "加载失败";
          return;
        }
        document.getElementById("apiKey").textContent = d.api_key || "";
        document.getElementById("planName").textContent = d.plan || "";
        const used = d.usage_count ?? 0;
        const max = d.max_limit ?? 1;
        document.getElementById("usageText").textContent = `${used} / ${max}`;
        const pct = Math.min(100, Math.round((used / max) * 100));
        document.getElementById("usageBar").style.width = pct + "%";

        const tbody = document.getElementById("logBody");
        tbody.innerHTML = "";
        (d.logs || []).forEach((row) => {
          const tr = document.createElement("tr");
          tr.className = "border-b border-white/5";
          const t = new Date(row.created_at).toLocaleString();
          tr.innerHTML = `<td class="py-2 pr-4 text-slate-400">${t}</td>
            <td class="py-2 pr-4">${row.endpoint}</td>
            <td class="max-w-[200px] truncate py-2 pr-4" title="${row.target_url || ""}">${row.target_url || "—"}</td>
            <td class="max-w-[180px] truncate py-2"><a class="text-indigo-400 hover:underline" href="${row.result_path || "#"}" target="_blank" rel="noreferrer">${row.result_path ? "链接" : "—"}</a></td>`;
          tbody.appendChild(tr);
        });
      }

      document.getElementById("copyKey").onclick = async () => {
        const t = document.getElementById("apiKey").textContent;
        try {
          await navigator.clipboard.writeText(t);
          alert("已复制");
        } catch {
          prompt("复制以下内容：", t);
        }
      };

      document.getElementById("logout").onclick = async () => {
        await fetch("/auth/logout", { method: "POST", credentials: "include" });
        window.location.href = "/login";
      };

      load();
    </script>
  </body>
</html>
